<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>桃園市新生學生卡拍照系統iPad版</title>
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --line:#2a2f3a;
    --txt:#e6e9ef; --mut:#9aa3b2; --acc:#4f8cff; --acc2:#3a6fd8;
    --ok:#36c08a; --warn:#f0a832; --danger:#e5574e;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;
    background:#000;color:var(--txt);font-size:15px;line-height:1.5;
    display:flex;flex-direction:column;height:100vh;overflow:hidden}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);padding:9px 14px;border-radius:10px;transition:.12s}
  button:hover{border-color:var(--acc);color:#fff}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
  button.primary:hover{background:var(--acc2)}
  button.ghost{background:transparent}
  button.sm{padding:5px 10px;font-size:13px;border-radius:8px}
  button.big{font-size:19px;font-weight:700;padding:16px 28px;border-radius:14px;width:100%;max-width:440px}
  .grow{flex:1}
  header{display:flex;align-items:center;gap:10px;padding:10px 14px;
    padding-top:calc(10px + env(safe-area-inset-top));background:var(--panel);border-bottom:1px solid var(--line)}
  header h1{font-size:16px;margin:0}
  .stage{position:relative;flex:1;min-height:0;display:flex;background:#000;overflow:hidden}
  video{width:100%;height:100%;object-fit:contain;display:block}
  .frame{position:absolute;left:0;top:0;box-shadow:0 0 0 9999px #000;
    outline:2px solid rgba(255,255,255,.85);pointer-events:none}
  .overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:bottom center;
    padding:6% 3% 1% 3%;box-sizing:border-box;pointer-events:none;opacity:.6}
  .overlay.hidden{display:none}
  .controls{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;
    padding:12px 16px;background:var(--panel)}
  .controls .count{justify-self:start;color:var(--mut);font-size:13px}
  .shutter{width:80px;height:80px;border-radius:50%;background:#fff;border:6px solid var(--acc);
    cursor:pointer;justify-self:center;padding:0}
  .shutter:hover{background:#eaeaea;border-color:var(--acc2)}
  .shutter:active{transform:scale(.93)}
  .tray{background:var(--panel);border-top:1px solid var(--line);
    padding:12px 14px;padding-bottom:calc(12px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;gap:12px;align-items:center;max-height:40vh;overflow:auto}
  .strip{display:flex;gap:8px;flex-wrap:wrap;width:100%}
  .shot{position:relative;width:74px;height:74px;border-radius:8px;overflow:hidden;
    border:2px solid var(--line);cursor:pointer;flex:0 0 auto}
  .shot.sel{border-color:var(--ok)}
  .shot img{width:100%;height:100%;object-fit:cover;display:block}
  .shot .chk{position:absolute;top:3px;left:3px;width:18px;height:18px}
  .shot .rm{position:absolute;bottom:0;right:0;background:rgba(0,0,0,.65);color:#fff;
    border:none;font-size:11px;padding:1px 6px;cursor:pointer}
  .status{font-size:13px;color:var(--mut);min-height:18px;text-align:center}
  .status.ok{color:var(--ok)} .status.err{color:var(--danger)} .status.warn{color:var(--warn)}
</style>
</head>
<body>
<header>
  <h1>📸 桃園市新生學生卡拍照系統iPad版</h1>
  <span class="grow"></span>
  <button id="overlayBtn" class="sm">參考框：開</button>
</header>

<div class="stage">
  <video id="video" playsinline muted autoplay></video>
  <div id="frame" class="frame"><img id="overlay" class="overlay" src="template-overlay.png" alt="人像參考框"></div>
</div>

<div class="controls">
  <span class="count" id="count">尚未拍攝</span>
  <button id="shot" class="shutter" title="拍攝一張（也可按 Enter／空白鍵）"></button>
  <span></span>
</div>

<div class="tray">
  <div class="strip" id="strip"></div>
  <button id="download" class="primary big">⬇ 下載 ZIP 打包檔</button>
  <button id="clear" class="ghost sm">清除全部</button>
  <div class="status" id="status"></div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
let uid = 0;
const cam = { stream:null, shots:[] };
const video = $("#video"), overlay = $("#overlay"), strip = $("#strip");

/* ---------- 相機 ---------- */
async function startCamera(){
  stopCamera();
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    setStatus("此瀏覽器不支援相機存取。","err"); return;
  }
  try{
    cam.stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment", width:{ideal:3840}, height:{ideal:2160}}, audio:false});
    video.srcObject = cam.stream; await video.play();
    requestAnimationFrame(positionFrame); setTimeout(positionFrame,300);
  }catch(e){
    setStatus("無法開啟相機（"+e.name+"）。請允許相機權限；若以 file:// 開啟，部分瀏覽器會擋相機，建議用 https/GitHub Pages 開啟。","err");
  }
}
function stopCamera(){ if(cam.stream){ cam.stream.getTracks().forEach(t=>t.stop()); cam.stream=null; } }
// 拍攝比例：寬:高 = 1:1.2
const PHOTO_ASPECT = 1/1.2;
// 把 3.5×4.5 拍攝框貼齊影片實際顯示矩形的中央
function positionFrame(){
  const wrap=video.parentElement, vw=video.videoWidth, vh=video.videoHeight, cw=wrap.clientWidth, ch=wrap.clientHeight;
  if(!vw||!vh||!cw||!ch) return;
  const s=Math.min(cw/vw, ch/vh), dw=vw*s, dh=vh*s, dx=(cw-dw)/2, dy=(ch-dh)/2;
  let fw,fh;
  if(dw/dh > PHOTO_ASPECT){ fh=dh; fw=fh*PHOTO_ASPECT; } else { fw=dw; fh=fw/PHOTO_ASPECT; }
  const f=$("#frame");
  f.style.left=(dx+(dw-fw)/2)+"px"; f.style.top=(dy+(dh-fh)/2)+"px";
  f.style.width=fw+"px"; f.style.height=fh+"px";
}
video.addEventListener("loadedmetadata", positionFrame);
video.addEventListener("playing", positionFrame);
window.addEventListener("resize", positionFrame);

function takeShot(){
  const vw=video.videoWidth, vh=video.videoHeight;
  if(!cam.stream || !vw || !vh){ setStatus("相機尚未就緒。","warn"); return; }
  let cw,ch; // 從畫面中央裁出 3.5:4.5 的最大區域
  if(vw/vh > PHOTO_ASPECT){ ch=vh; cw=Math.round(vh*PHOTO_ASPECT); } else { cw=vw; ch=Math.round(vw/PHOTO_ASPECT); }
  const sx=Math.round((vw-cw)/2), sy=Math.round((vh-ch)/2);
  const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
  cv.getContext("2d").drawImage(video, sx,sy,cw,ch, 0,0,cw,ch);
  cv.toBlob(b=>{ cam.shots.push({id:++uid, blob:b, url:URL.createObjectURL(b), sel:true}); renderStrip(); }, "image/jpeg", 0.95);
}
$("#shot").onclick = takeShot;
document.addEventListener("keydown", e=>{
  if(e.code==="Space"||e.code==="Enter"||e.key===" "||e.key==="Enter"){ e.preventDefault(); takeShot(); }
});

function renderStrip(){
  strip.innerHTML="";
  cam.shots.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="shot"+(s.sel?" sel":"");
    d.innerHTML=`<img src="${s.url}"><input type="checkbox" class="chk" ${s.sel?"checked":""}><button class="rm">移除</button>`;
    const toggle=v=>{s.sel=v; d.classList.toggle("sel",v); d.querySelector(".chk").checked=v; updateCount();};
    d.querySelector("img").onclick=()=>toggle(!s.sel);
    d.querySelector(".chk").onchange=e=>toggle(e.target.checked);
    d.querySelector(".rm").onclick=ev=>{ev.stopPropagation(); URL.revokeObjectURL(s.url); cam.shots.splice(i,1); renderStrip();};
    strip.appendChild(d);
  });
  updateCount();
}
function updateCount(){
  const sel=cam.shots.filter(s=>s.sel).length;
  $("#count").textContent = cam.shots.length ? `已拍 ${cam.shots.length} 張，選取 ${sel} 張` : "尚未拍攝";
}
$("#clear").onclick=()=>{
  if(!cam.shots.length) return;
  if(confirm("確定清除全部拍攝的照片？")){ cam.shots.forEach(s=>URL.revokeObjectURL(s.url)); cam.shots=[]; renderStrip(); setStatus(""); }
};

/* ---------- 參考框 ---------- */
$("#overlayBtn").onclick=()=>{
  const hidden=overlay.classList.toggle("hidden");
  $("#overlayBtn").textContent = hidden ? "參考框：關" : "參考框：開";
};

/* ---------- 狀態 ---------- */
function setStatus(html, cls){
  const el=$("#status"); el.className="status"+(cls?" "+cls:""); el.innerHTML=html;
}
function setBusy(on,text){
  $("#download").disabled=on; $("#shot").disabled=on;
  if(text) setStatus(text, on?"warn":"");
}
function pad(n){ return String(n).padStart(2,"0"); }
function stampNow(){ return new Date().toISOString().replace(/[-:T]/g,"").slice(0,14); }

/* ---------- 打包 ZIP（store 無壓縮，內建 CRC32） ---------- */
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;
  for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(u8){let c=0xFFFFFFFF;for(let i=0;i<u8.length;i++)c=CRC_TABLE[(c^u8[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function buildZip(files){
  const enc=new TextEncoder(); const chunks=[], central=[]; let offset=0;
  const time=0, date=(0<<9)|(1<<5)|1;
  for(const f of files){
    const nameB=enc.encode(f.name), crc=crc32(f.data), size=f.data.length;
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true); lh.setUint16(4,20,true); lh.setUint16(6,0x0800,true);
    lh.setUint16(8,0,true); lh.setUint16(10,time,true); lh.setUint16(12,date,true);
    lh.setUint32(14,crc,true); lh.setUint32(18,size,true); lh.setUint32(22,size,true);
    lh.setUint16(26,nameB.length,true); lh.setUint16(28,0,true);
    chunks.push(new Uint8Array(lh.buffer), nameB, f.data);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true); ch.setUint16(4,20,true); ch.setUint16(6,20,true);
    ch.setUint16(8,0x0800,true); ch.setUint16(10,0,true); ch.setUint16(12,time,true);
    ch.setUint16(14,date,true); ch.setUint32(16,crc,true); ch.setUint32(20,size,true);
    ch.setUint32(24,size,true); ch.setUint16(28,nameB.length,true); ch.setUint16(30,0,true);
    ch.setUint16(32,0,true); ch.setUint16(34,0,true); ch.setUint16(36,0,true);
    ch.setUint32(38,0,true); ch.setUint32(42,offset,true);
    const cd=new Uint8Array(46+nameB.length); cd.set(new Uint8Array(ch.buffer),0); cd.set(nameB,46);
    central.push(cd); offset += 30+nameB.length+size;
  }
  let cdSize=0; for(const c of central)cdSize+=c.length;
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true); eo.setUint16(4,0,true); eo.setUint16(6,0,true);
  eo.setUint16(8,files.length,true); eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true); eo.setUint32(16,offset,true); eo.setUint16(20,0,true);
  return new Blob([...chunks,...central,new Uint8Array(eo.buffer)],{type:"application/zip"});
}
async function selectedZip(){
  const sel=cam.shots.filter(s=>s.sel);
  if(!sel.length){ setStatus("請至少拍一張並勾選要使用的照片。","warn"); return null; }
  const stamp=stampNow();
  const files=await Promise.all(sel.map(async (s,i)=>({
    name:`shot_${stamp}_${pad(i+1)}.jpg`, data:new Uint8Array(await s.blob.arrayBuffer())
  })));
  return { blob: buildZip(files), name:`photos_${stamp}.zip`, count: sel.length };
}

/* ---------- 下載 ZIP ---------- */
$("#download").onclick=async()=>{
  setBusy(true,"打包中…");
  try{
    const z=await selectedZip(); if(!z){ setBusy(false); return; }
    const a=document.createElement("a"); const url=URL.createObjectURL(z.blob);
    a.href=url; a.download=z.name; a.click(); setTimeout(()=>URL.revokeObjectURL(url),4000);
    setStatus(`✅ 已下載 ${z.name}（${z.count} 張）。`,"ok");
  }catch(e){ setStatus("打包失敗："+(e.message||e),"err"); }
  finally{ setBusy(false); }
};

/* ---------- 啟動 ---------- */
window.addEventListener("pagehide", stopCamera);
startCamera();
renderStrip();
</script>
</body>
</html>
