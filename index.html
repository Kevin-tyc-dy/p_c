<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃園市新生學生卡拍照系統</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel2:#1f232c; --line:#2a2f3a;
    --txt:#e6e9ef; --mut:#9aa3b2; --acc:#4f8cff; --acc2:#3a6fd8;
    --ok:#36c08a; --warn:#f0a832; --danger:#e5574e; --chip:#262b35;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI","Noto Sans TC",system-ui,sans-serif;
    background:var(--bg);color:var(--txt);font-size:14px;line-height:1.5}
  h1{font-size:18px;margin:0}
  h2{font-size:14px;margin:0 0 10px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
    padding:12px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
  .grow{flex:1}
  button{font:inherit;cursor:pointer;border:1px solid var(--line);background:var(--panel2);
    color:var(--txt);padding:7px 12px;border-radius:8px;transition:.12s}
  button:hover{border-color:var(--acc);color:#fff}
  button:disabled{opacity:.4;cursor:not-allowed}
  button.primary{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:600}
  button.primary:hover{background:var(--acc2)}
  button.ghost{background:transparent}
  button.sm{padding:3px 8px;font-size:12px;border-radius:6px}
  .danger{color:var(--danger);border-color:#46302e}
  .danger:hover{border-color:var(--danger);color:#fff;background:var(--danger)}
  .layout{display:grid;grid-template-columns:300px 1fr;gap:0;align-items:start}
  aside{position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto;
    background:var(--panel);border-right:1px solid var(--line);padding:18px}
  main{padding:18px;min-height:calc(100vh - 57px)}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:16px}
  label{display:block;color:var(--mut);font-size:12px;margin-bottom:4px}
  input[type=number],input[type=text],textarea,select{
    width:100%;background:var(--bg);border:1px solid var(--line);color:var(--txt);
    border-radius:8px;padding:7px 9px;font:inherit}
  textarea{resize:vertical;min-height:160px;font-family:ui-monospace,Menlo,Consolas,monospace;font-size:13px;white-space:pre}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{border:none;border-radius:0;background:transparent;padding:5px 12px}
  .seg button.on{background:var(--acc);color:#fff}
  .edge-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px}
  .hint{color:var(--mut);font-size:12px;margin-top:6px}
  .chip{display:inline-block;background:var(--chip);border-radius:6px;padding:2px 8px;font-size:12px;color:var(--mut)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
  .photo{background:var(--panel2);border:1px solid var(--line);border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
  .photo .pv{position:relative;background:#000;display:flex;align-items:center;justify-content:center;width:100%;aspect-ratio:3/4}
  .photo canvas{max-width:100%;max-height:100%;display:block}
  .photo .idx{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;
    border-radius:6px;padding:1px 8px;font-size:12px;font-weight:600}
  .photo .body{padding:10px 12px;display:flex;flex-direction:column;gap:8px}
  .nm{font-size:12px;color:var(--mut);word-break:break-all}
  .rinfo{font-size:14px;color:var(--acc);font-weight:700}
  .nm b{color:var(--ok);font-weight:600}
  .ov-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .ov-grid label{font-size:10px;margin:0 0 2px}
  .ov-grid input{padding:4px 5px;font-size:12px;text-align:center}
  .rowbtns{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .dim{font-size:11px;color:var(--mut)}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:60vh;color:var(--mut);text-align:center;gap:12px;border:2px dashed var(--line);border-radius:16px}
  .drop{outline:2px dashed var(--acc);outline-offset:-8px}
  .toggle{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--mut)}
  .toggle input{width:auto}
  .count{font-size:13px;color:var(--mut)}
  .custom-on{border-color:var(--warn)!important}
  .badge-c{color:var(--warn);font-size:11px}
  a.dl{display:none}
  .collapse-toggle{width:100%;display:flex;justify-content:space-between;align-items:center;
    background:transparent;border:none;color:var(--mut);font-size:14px;font-weight:600;
    text-transform:uppercase;letter-spacing:.5px;padding:0;cursor:pointer}
  .collapse-toggle:hover{color:#fff}
  .collapse-body{margin-top:12px}
  .collapse-body.hidden{display:none}
  .modal{position:fixed;inset:0;background:#000;z-index:50;display:none;
    align-items:center;justify-content:center;padding:0}
  .modal.open{display:flex}
  .cam{background:var(--panel);border:none;border-radius:0;
    width:100%;height:100%;max-height:100vh;overflow:auto;padding:14px;display:flex;flex-direction:column}
  .cam-head{display:flex;align-items:center;gap:10px;margin-bottom:10px}
  .cam-video-wrap{position:relative;flex:1;min-height:0;display:flex;border-radius:10px;overflow:hidden;background:#000}
  .cam video{width:100%;height:100%;object-fit:contain;display:block}
  .cam-frame{position:absolute;left:0;top:0;box-shadow:0 0 0 9999px #000;outline:2px solid rgba(255,255,255,.85);pointer-events:none}
  .cam-overlay{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:bottom center;padding:6% 3% 1% 3%;box-sizing:border-box;pointer-events:none;opacity:.55}
  .cam-overlay.hidden{display:none}
  .cam-controls{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-top:12px}
  .cam-controls #camAdd{justify-self:end}
  .shutter{width:78px;height:78px;border-radius:50%;background:#fff;border:5px solid var(--acc);
    cursor:pointer;justify-self:center;padding:0}
  .shutter:hover{background:#eaeaea;border-color:var(--acc2)}
  .shutter:active{transform:scale(.94)}
  .cam-strip{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;height:150px;overflow-y:auto;align-content:flex-start;border:1px solid var(--line);border-radius:8px;padding:6px}
  .shot{position:relative;width:92px;height:92px;border-radius:8px;overflow:hidden;border:2px solid var(--line);cursor:pointer}
  .shot.sel{border-color:var(--ok)}
  .shot img{width:100%;height:100%;object-fit:cover;display:block}
  .shot .chk{position:absolute;top:4px;left:4px;width:18px;height:18px}
  .shot .rm{position:absolute;bottom:0;right:0;background:rgba(0,0,0,.65);color:#fff;
    border:none;font-size:11px;padding:1px 6px;cursor:pointer}
  .cam-msg{color:var(--warn);font-size:13px;margin-top:10px;line-height:1.5}
</style>
</head>
<body>
<header>
  <h1>📷 桃園市新生學生卡拍照系統</h1>
  <span class="count" id="count">尚未匯入照片</span>
  <span class="grow"></span>
  <a href="guide.html" target="_blank" style="color:var(--mut);text-decoration:none;border:1px solid var(--line);padding:7px 12px;border-radius:8px;font-size:14px">📖 使用說明</a>
  <button id="clearBtn" class="danger ghost">清空</button>
  <button id="cameraBtn">📸 拍照</button>
  <button id="importBtn" class="primary">＋ 匯入照片</button>
  <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
</header>

<div class="layout">
  <aside>
    <!-- 批次更名（移到最上面） -->
    <div class="card">
      <h2>批次更名欄位</h2>
      <label>從試算表中依座號順序複製學生「學號」欄位貼上（一行一個檔名，依照片順序對應）</label>
      <textarea id="renameBox" placeholder="110001&#10;110002&#10;110003&#10;..."></textarea>
      <button class="ghost sm" id="importNames" style="width:100%;margin-top:8px">📄 從 Excel 匯入（座號／姓名／學號）</button>
      <input type="file" id="namesFile" accept=".xlsx,.xls" style="display:none">
      <button class="ghost sm" id="sampleXlsx" style="width:100%;margin-top:6px">⬇ 下載範例 Excel</button>
      <div class="toggle" style="margin-top:8px">
        <input type="checkbox" id="keepExt" checked>
        <label for="keepExt" style="margin:0">自動保留原副檔名（.jpg/.png…）</label>
      </div>
      <button class="primary" id="applyNames" style="width:100%;margin-top:10px">套用名稱（依序）</button>
      <p class="hint" id="renameStat"></p>
    </div>

    <!-- 批次裁切（邊緣）：可收合，預設收合 -->
    <div class="card">
      <button class="collapse-toggle" id="cropToggle">批次裁切（邊緣）<span id="cropArrow">▸</span></button>
      <div id="cropBody" class="collapse-body hidden">
        <label>單位</label>
        <div class="seg" id="unitSeg">
          <button data-unit="px" class="on">像素 px</button>
          <button data-unit="pct">比率 %</button>
        </div>
        <div class="edge-grid" style="margin-top:12px">
          <div><label>上 Top</label><input type="number" id="bTop" value="0" min="0" step="1"></div>
          <div><label>下 Bottom</label><input type="number" id="bBottom" value="0" min="0" step="1"></div>
          <div><label>左 Left</label><input type="number" id="bLeft" value="0" min="0" step="1"></div>
          <div><label>右 Right</label><input type="number" id="bRight" value="0" min="0" step="1"></div>
        </div>
        <p class="hint">數值＝從該邊往內裁掉的量。% 模式下，上下以高度計、左右以寬度計。</p>
        <button class="primary" id="applyAll" style="width:100%;margin-top:6px">套用到全部</button>
        <button class="ghost sm" id="resetCrop" style="width:100%;margin-top:6px">全部歸零</button>
      </div>
    </div>

    <!-- 輸出 -->
    <div class="card">
      <h2>輸出</h2>
      <label>輸出格式</label>
      <select id="outFmt">
        <option value="orig">維持原格式</option>
        <option value="image/jpeg">JPEG (.jpg)</option>
        <option value="image/png">PNG (.png)</option>
        <option value="image/webp">WebP (.webp)</option>
      </select>
      <label style="margin-top:10px">JPEG/WebP 品質：<span id="qVal">0.92</span></label>
      <input type="range" id="quality" min="0.5" max="1" step="0.01" value="0.92" style="width:100%">
      <button class="primary" id="dlAll" style="width:100%;margin-top:12px">⬇ 下載 ZIP 打包檔</button>
      <p class="hint">全部裁切＋更名後打包成一個 zip 檔下載（單張仍可用卡片上的「下載」鈕）。</p>
    </div>

    <p style="color:var(--mut);font-size:11.5px;line-height:1.7;text-align:center;margin:8px 4px 0">本系統由大勇國小教學團隊開發，歡迎使用。<br>問題請洽 張文宜：<a href="mailto:taco@m2.typs.tyc.edu.tw" style="color:var(--acc2)">taco@m2.typs.tyc.edu.tw</a></p>
  </aside>

  <main id="main">
    <div class="empty" id="empty">
      <div style="font-size:42px">🖼️</div>
      <div>把照片拖進來，或點右上角「匯入照片」<br>一次可選 50 張以上</div>
      <button class="primary" id="emptyImport">選擇照片</button>
    </div>
    <div class="grid" id="grid" style="display:none"></div>
  </main>
</div>

<a class="dl" id="dlAnchor"></a>

<!-- 拍照視窗 -->
<div class="modal" id="camModal">
  <div class="cam">
    <div class="cam-head">
      <h2 style="margin:0">📸 拍照</h2>
      <span class="grow"></span>
      <button id="camOverlayBtn" class="sm">參考框：開</button>
      <button id="camClose" class="sm">關閉</button>
    </div>
    <div class="cam-video-wrap">
      <video id="camVideo" playsinline muted autoplay></video>
      <div id="camFrame" class="cam-frame"><img id="camOverlay" class="cam-overlay" src="template-overlay.png" alt="人像參考框"></div>
    </div>
    <div class="cam-msg" id="camMsg"></div>
    <div class="cam-controls">
      <span class="dim" id="camCount">尚未拍攝</span>
      <button id="camShot" class="shutter" title="拍攝一張"></button>
      <button id="camAdd" class="primary">加入選取的照片 →</button>
    </div>
    <div class="cam-strip" id="camStrip"></div>
  </div>
</div>

<script>
"use strict";
const $ = s => document.querySelector(s);
const photos = []; // {id,file,name,base,ext,img,w,h,custom,crop:{top,bottom,left,right,unit},newName}
let uid = 0;

const els = {
  fileInput:$("#fileInput"), grid:$("#grid"), empty:$("#empty"), count:$("#count"),
  bTop:$("#bTop"), bBottom:$("#bBottom"), bLeft:$("#bLeft"), bRight:$("#bRight"),
  renameBox:$("#renameBox"), keepExt:$("#keepExt"), renameStat:$("#renameStat"),
  outFmt:$("#outFmt"), quality:$("#quality"), qVal:$("#qVal")
};
let unit = "px";

/* ---------- 匯入 ---------- */
$("#importBtn").onclick = ()=> els.fileInput.click();
$("#emptyImport").onclick = ()=> els.fileInput.click();
els.fileInput.onchange = e => addFiles(e.target.files);

["dragover","dragenter"].forEach(ev=>document.addEventListener(ev,e=>{
  e.preventDefault(); document.body.classList.add("drop");
}));
["dragleave","drop"].forEach(ev=>document.addEventListener(ev,e=>{
  e.preventDefault();
  if(ev==="drop" && e.dataTransfer.files.length) addFiles(e.dataTransfer.files);
  if(ev==="dragleave" && e.relatedTarget) return;
  document.body.classList.remove("drop");
}));

function addFiles(fileList){
  const files=[...fileList].filter(f=>f.type.startsWith("image/"));
  files.forEach(file=>{
    const ext=(file.name.match(/\.[^.\/\\]+$/)||[""])[0].toLowerCase();
    const base=file.name.replace(/\.[^.\/\\]+$/,"");
    const p={id:++uid,file,name:file.name,base,ext,img:null,w:0,h:0,
      custom:false, crop:{top:0,bottom:0,left:0,right:0,unit:"px"}, newName:base};
    photos.push(p);
    const url=URL.createObjectURL(file);
    const im=new Image();
    im.onload=()=>{p.img=im;p.w=im.naturalWidth;p.h=im.naturalHeight;
      p.crop=readBatch(); p.crop.unit=unit;
      drawCard(p); URL.revokeObjectURL(url);};
    im.src=url;
  });
  render();
  els.fileInput.value="";
}

/* ---------- 裁切數學 ---------- */
function readBatch(){
  return {top:+els.bTop.value||0, bottom:+els.bBottom.value||0,
          left:+els.bLeft.value||0, right:+els.bRight.value||0, unit};
}
// 回傳實際像素裁切框 {sx,sy,sw,sh}
function cropRect(p){
  const c=p.crop, W=p.w, H=p.h;
  let t,b,l,r;
  if(c.unit==="pct"){
    t=Math.round(H*c.top/100); b=Math.round(H*c.bottom/100);
    l=Math.round(W*c.left/100); r=Math.round(W*c.right/100);
  }else{ t=Math.round(c.top); b=Math.round(c.bottom); l=Math.round(c.left); r=Math.round(c.right); }
  // 夾限，避免負寬高
  t=Math.max(0,Math.min(t,H-1)); b=Math.max(0,Math.min(b,H-1-t));
  l=Math.max(0,Math.min(l,W-1)); r=Math.max(0,Math.min(r,W-1-l));
  return {sx:l, sy:t, sw:W-l-r, sh:H-t-b};
}

/* ---------- 卡片渲染 ---------- */
function render(){
  const has=photos.length>0;
  els.empty.style.display=has?"none":"flex";
  els.grid.style.display=has?"grid":"none";
  els.count.textContent= has? `共 ${photos.length} 張照片` : "尚未匯入照片";
  els.grid.innerHTML="";
  photos.forEach((p,i)=>els.grid.appendChild(makeCard(p,i)));
  photos.forEach(p=>p.img&&drawCard(p));
  updateRenameStat();
}

function makeCard(p,i){
  const el=document.createElement("div");
  el.className="photo"+(p.custom?" custom-on":"");
  el.dataset.id=p.id;
  el.innerHTML=`
    <div class="pv"><span class="idx">${i+1}</span><canvas></canvas></div>
    <div class="body">
      ${roster[i]?`<div class="rinfo">座號 ${roster[i].seat}　${roster[i].name}</div>`:""}
      <div class="nm">原：${p.name}</div>
      <div class="nm">新：<b class="newn"></b> <span class="dim outdim"></span></div>
      <div>
        <div class="rowbtns" style="justify-content:space-between">
          <span class="dim ctag">${p.custom?'個別裁切 <span class="badge-c">●自訂</span>':'個別裁切 <span class="dim">(隨批次)</span>'}</span>
          <span class="dim">${p.crop.unit==="pct"?"%":"px"}</span>
        </div>
        <div class="ov-grid" style="margin-top:4px">
          <div><label>上</label><input type="number" min="0" class="ovt" value="${p.crop.top}"></div>
          <div><label>下</label><input type="number" min="0" class="ovb" value="${p.crop.bottom}"></div>
          <div><label>左</label><input type="number" min="0" class="ovl" value="${p.crop.left}"></div>
          <div><label>右</label><input type="number" min="0" class="ovr" value="${p.crop.right}"></div>
        </div>
      </div>
      <div class="rowbtns">
        <button class="sm mv-up" title="上移">◀</button>
        <button class="sm mv-dn" title="下移">▶</button>
        <button class="sm rname-edit">改名</button>
        <button class="sm dl-one primary">⬇ 下載</button>
        <button class="sm del danger ghost" title="移除">✕</button>
      </div>
    </div>`;
  const set=(cls,key)=>{
    const inp=el.querySelector(cls);
    inp.oninput=()=>{p.crop[key]=+inp.value||0; p.custom=true; el.classList.add("custom-on");
      el.querySelector(".ctag").innerHTML='個別裁切 <span class="badge-c">●自訂</span>';
      drawCard(p);};
  };
  set(".ovt","top");set(".ovb","bottom");set(".ovl","left");set(".ovr","right");
  el.querySelector(".del").onclick=()=>{const k=photos.indexOf(p);photos.splice(k,1);render();};
  el.querySelector(".mv-up").onclick=()=>move(p,-1);
  el.querySelector(".mv-dn").onclick=()=>move(p,1);
  el.querySelector(".rname-edit").onclick=()=>{
    const v=prompt("輸入新檔名（不含副檔名）",p.newName);
    if(v!==null){p.newName=v.trim()||p.base;drawCard(p);}
  };
  el.querySelector(".dl-one").onclick=()=>downloadOne(p);
  return el;
}

function move(p,dir){
  const i=photos.indexOf(p), j=i+dir;
  if(j<0||j>=photos.length)return;
  photos.splice(i,1); photos.splice(j,0,p); render();
}

function drawCard(p){
  const el=els.grid.querySelector(`.photo[data-id="${p.id}"]`);
  if(!el||!p.img)return;
  const r=cropRect(p);
  const cv=el.querySelector("canvas");
  cv.width=r.sw; cv.height=r.sh;
  cv.getContext("2d").drawImage(p.img, r.sx,r.sy,r.sw,r.sh, 0,0,r.sw,r.sh);
  el.querySelector(".newn").textContent=p.newName+outExt(p);
  el.querySelector(".outdim").textContent=`${r.sw}×${r.sh}`;
}

/* ---------- 批次操作 ---------- */
$("#cropToggle").onclick=()=>{
  const hidden=$("#cropBody").classList.toggle("hidden");
  $("#cropArrow").textContent = hidden ? "▸" : "▾";
};
$("#unitSeg").querySelectorAll("button").forEach(b=>b.onclick=()=>{
  unit=b.dataset.unit;
  $("#unitSeg").querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
});
$("#applyAll").onclick=()=>{
  const c=readBatch();
  photos.forEach(p=>{p.crop={...c}; p.custom=false;});
  render();
};
$("#resetCrop").onclick=()=>{
  els.bTop.value=els.bBottom.value=els.bLeft.value=els.bRight.value=0;
  photos.forEach(p=>{p.crop={top:0,bottom:0,left:0,right:0,unit}; p.custom=false;});
  render();
};

/* ---------- 更名 ---------- */
$("#applyNames").onclick=()=>{
  const lines=els.renameBox.value.replace(/\r/g,"").split("\n");
  while(lines.length && lines[lines.length-1].trim()==="") lines.pop();
  let n=0;
  photos.forEach((p,i)=>{
    if(i<lines.length && lines[i].trim()!==""){
      let nm=lines[i].trim().replace(/\.[^.\/\\]+$/,""); // newName 一律不含副檔名，副檔名於匯出時決定
      p.newName=nm; n++;
    }
  });
  render();
  els.renameStat.textContent=`已套用 ${n} 個名稱（共 ${photos.length} 張，貼上 ${lines.length} 行）`;
};
function updateRenameStat(){
  const lines=els.renameBox.value.replace(/\r/g,"").split("\n").filter(l=>l.trim()!=="").length;
  if(lines) els.renameStat.textContent=`偵測到 ${lines} 行名稱，照片 ${photos.length} 張`;
}
els.renameBox.oninput=updateRenameStat;

/* ---------- 從 Excel 匯入（第一欄座號、第二欄姓名、第三欄學號；含標題列） ---------- */
let roster = []; // [{seat,name,id}]，依列順序對應照片次序
$("#importNames").onclick=()=>{
  if(!photos.length){ alert("請先匯入照片，再匯入 Excel 名單。"); return; }
  $("#namesFile").click();
};
$("#namesFile").onchange=e=>{ const f=e.target.files[0]; if(f) importRosterFile(f); e.target.value=""; };
function importRosterFile(file){
  if(typeof XLSX==="undefined"){ els.renameStat.textContent="Excel 函式庫尚未載入（請確認網路，或改用 https／GitHub Pages 開啟）。"; return; }
  const reader=new FileReader();
  reader.onload=()=>{
    try{
      const wb=XLSX.read(new Uint8Array(reader.result), {type:"array"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws, {header:1, blankrows:false});
      const body=rows.slice(1).filter(r=>r && (r[0]!=null||r[1]!=null||r[2]!=null)); // 跳過標題列
      roster = body.map(r=>({
        seat:(r[0]??"").toString().trim(),
        name:(r[1]??"").toString().trim(),
        id:(r[2]??"").toString().trim()
      }));
      els.renameBox.value = roster.map(r=>r.id).join("\n");
      render();
      els.renameStat.textContent=`已從「${file.name}」匯入 ${roster.length} 筆：已帶入學號、並在照片上顯示座號/姓名。按「套用名稱」即可套到檔名。`;
    }catch(err){ els.renameStat.textContent="讀取 Excel 失敗："+(err.message||err); }
  };
  reader.readAsArrayBuffer(file);
}

/* ---------- 輸出 ---------- */
els.quality.oninput=()=>els.qVal.textContent=(+els.quality.value).toFixed(2);
function outMime(p){
  const f=els.outFmt.value;
  if(f!=="orig")return f;
  return p.file.type || "image/png";
}
function outExt(p){
  const m=outMime(p);
  return ({"image/jpeg":".jpg","image/png":".png","image/webp":".webp"})[m]
    || p.ext || ".png";
}
function renderBlob(p){
  return new Promise(res=>{
    const r=cropRect(p);
    const cv=document.createElement("canvas");
    cv.width=r.sw; cv.height=r.sh;
    const ctx=cv.getContext("2d");
    if(outMime(p)==="image/jpeg"){ctx.fillStyle="#fff";ctx.fillRect(0,0,r.sw,r.sh);}
    ctx.drawImage(p.img, r.sx,r.sy,r.sw,r.sh, 0,0,r.sw,r.sh);
    cv.toBlob(b=>res(b), outMime(p), +els.quality.value);
  });
}
async function downloadOne(p){
  const blob=await renderBlob(p);
  triggerDownload(blob, safeName(p.newName)+outExt(p));
}
$("#dlAll").onclick=async()=>{
  if(!photos.length)return;
  const btn=$("#dlAll"); btn.disabled=true; const old=btn.textContent;
  const seen={}, files=[];
  for(let i=0;i<photos.length;i++){
    const p=photos[i];
    btn.textContent=`處理中… ${i+1}/${photos.length}`;
    let name=safeName(p.newName), fn=name+outExt(p);
    if(seen[fn]){seen[fn]++; fn=name+"_"+seen[fn]+outExt(p);} else seen[fn]=1;
    const blob=await renderBlob(p);
    files.push({name:fn, data:new Uint8Array(await blob.arrayBuffer())});
    await new Promise(r=>setTimeout(r,0));
  }
  btn.textContent="產生 zip…";
  const zip=buildZip(files);
  const stamp=new Date().toISOString().slice(0,10);
  triggerDownload(zip, `photos_${stamp}.zip`);
  btn.textContent=old; btn.disabled=false;
};

/* ---------- ZIP 產生器（store 無壓縮，內建 CRC32） ---------- */
const CRC_TABLE=(()=>{const t=new Uint32Array(256);for(let n=0;n<256;n++){let c=n;
  for(let k=0;k<8;k++)c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1);t[n]=c>>>0;}return t;})();
function crc32(u8){let c=0xFFFFFFFF;for(let i=0;i<u8.length;i++)c=CRC_TABLE[(c^u8[i])&0xFF]^(c>>>8);return (c^0xFFFFFFFF)>>>0;}
function buildZip(files){
  const enc=new TextEncoder();
  const chunks=[], central=[]; let offset=0;
  const time=0, date=(0<<9)|(1<<5)|1; // 固定 1980-01-01，避免時區問題
  for(const f of files){
    const nameB=enc.encode(f.name), crc=crc32(f.data), size=f.data.length;
    const lh=new DataView(new ArrayBuffer(30));
    lh.setUint32(0,0x04034b50,true); lh.setUint16(4,20,true); lh.setUint16(6,0x0800,true);
    lh.setUint16(8,0,true); lh.setUint16(10,time,true); lh.setUint16(12,date,true);
    lh.setUint32(14,crc,true); lh.setUint32(18,size,true); lh.setUint32(22,size,true);
    lh.setUint16(26,nameB.length,true); lh.setUint16(28,0,true);
    chunks.push(new Uint8Array(lh.buffer), nameB, f.data);
    const ch=new DataView(new ArrayBuffer(46));
    ch.setUint32(0,0x02014b50,true); ch.setUint16(4,20,true); ch.setUint16(6,20,true);
    ch.setUint16(8,0x0800,true); ch.setUint16(10,0,true); ch.setUint16(12,time,true);
    ch.setUint16(14,date,true); ch.setUint32(16,crc,true); ch.setUint32(20,size,true);
    ch.setUint32(24,size,true); ch.setUint16(28,nameB.length,true); ch.setUint16(30,0,true);
    ch.setUint16(32,0,true); ch.setUint16(34,0,true); ch.setUint16(36,0,true);
    ch.setUint32(38,0,true); ch.setUint32(42,offset,true);
    const cd=new Uint8Array(46+nameB.length); cd.set(new Uint8Array(ch.buffer),0); cd.set(nameB,46);
    central.push(cd);
    offset += 30+nameB.length+size;
  }
  let cdSize=0; for(const c of central)cdSize+=c.length;
  const eo=new DataView(new ArrayBuffer(22));
  eo.setUint32(0,0x06054b50,true); eo.setUint16(4,0,true); eo.setUint16(6,0,true);
  eo.setUint16(8,files.length,true); eo.setUint16(10,files.length,true);
  eo.setUint32(12,cdSize,true); eo.setUint32(16,offset,true); eo.setUint16(20,0,true);
  return new Blob([...chunks,...central,new Uint8Array(eo.buffer)],{type:"application/zip"});
}
function safeName(s){return (s||"image").replace(/[\\/:*?"<>|]/g,"_").trim()||"image";}
function triggerDownload(blob,filename){
  const a=$("#dlAnchor");
  const url=URL.createObjectURL(blob);
  a.href=url; a.download=filename; a.click();
  setTimeout(()=>URL.revokeObjectURL(url),4000);
}

/* ---------- 拍照 ---------- */
const cam={stream:null, shots:[], facing:"environment"};
const camModal=$("#camModal"), camVideo=$("#camVideo"),
      camStrip=$("#camStrip"), camMsg=$("#camMsg");
$("#cameraBtn").onclick=openCam;
$("#camClose").onclick=closeCam;
$("#camShot").onclick=takeShot;
$("#camAdd").onclick=addShots;
$("#camOverlayBtn").onclick=()=>{
  const hidden=$("#camOverlay").classList.toggle("hidden");
  $("#camOverlayBtn").textContent = hidden ? "參考框：關" : "參考框：開";
};
// 拍攝比例：寬:高 = 1:1.25，框貼齊影片顯示矩形的中央
const PHOTO_ASPECT = 1/1.25;
function positionFrame(){
  const wrap=camVideo.parentElement;
  const vw=camVideo.videoWidth, vh=camVideo.videoHeight, cw=wrap.clientWidth, ch=wrap.clientHeight;
  if(!vw||!vh||!cw||!ch) return;
  const s=Math.min(cw/vw, ch/vh), dw=vw*s, dh=vh*s, dx=(cw-dw)/2, dy=(ch-dh)/2;
  let fw,fh;
  if(dw/dh > PHOTO_ASPECT){ fh=dh; fw=fh*PHOTO_ASPECT; } else { fw=dw; fh=fw/PHOTO_ASPECT; }
  const f=$("#camFrame");
  f.style.left=(dx+(dw-fw)/2)+"px"; f.style.top=(dy+(dh-fh)/2)+"px";
  f.style.width=fw+"px"; f.style.height=fh+"px";
}
camVideo.addEventListener("loadedmetadata", positionFrame);
camVideo.addEventListener("playing", positionFrame);
window.addEventListener("resize", positionFrame);
// 實體快門：藍牙遙控器/鍵盤的 Enter 或空白鍵＝拍攝（iPad 系統音量鍵無法被網頁攔截）
document.addEventListener("keydown",e=>{
  if(!camModal.classList.contains("open"))return;
  if(e.code==="Space"||e.code==="Enter"||e.key===" "||e.key==="Enter"){ e.preventDefault(); takeShot(); }
});

async function openCam(){
  camModal.classList.add("open");
  camMsg.textContent="";
  await startStream();
  renderStrip();
}
async function startStream(){
  stopStream();
  if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    camMsg.textContent="此瀏覽器不支援相機存取。"; return;
  }
  try{
    cam.stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:cam.facing, width:{ideal:3840}, height:{ideal:2160}}, audio:false});
    camVideo.srcObject=cam.stream; await camVideo.play();
    requestAnimationFrame(positionFrame); setTimeout(positionFrame,300);
  }catch(e){
    camMsg.textContent="無法開啟相機（"+e.name+"）。若是雙擊開啟此檔（file://），多數瀏覽器會擋相機——請改用 Firefox，或透過本機伺服器/手機以 http://localhost 開啟本頁。";
  }
}
function stopStream(){ if(cam.stream){cam.stream.getTracks().forEach(t=>t.stop()); cam.stream=null;} }
function closeCam(){ stopStream(); camModal.classList.remove("open"); }
function takeShot(){
  const vw=camVideo.videoWidth, vh=camVideo.videoHeight;
  if(!cam.stream || !vw || !vh){ camMsg.textContent="相機尚未就緒。"; return; }
  let cw,ch; // 從畫面中央裁出 3.5:4.5 的最大區域
  if(vw/vh > PHOTO_ASPECT){ ch=vh; cw=Math.round(vh*PHOTO_ASPECT); } else { cw=vw; ch=Math.round(vw/PHOTO_ASPECT); }
  const sx=Math.round((vw-cw)/2), sy=Math.round((vh-ch)/2);
  const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
  cv.getContext("2d").drawImage(camVideo, sx,sy,cw,ch, 0,0,cw,ch);
  cv.toBlob(b=>{
    cam.shots.push({id:++uid, blob:b, url:URL.createObjectURL(b), sel:true});
    renderStrip();
    camStrip.scrollTop=camStrip.scrollHeight;
  },"image/jpeg",0.95);
}
function renderStrip(){
  camStrip.innerHTML="";
  cam.shots.forEach((s,i)=>{
    const d=document.createElement("div");
    d.className="shot"+(s.sel?" sel":"");
    d.innerHTML=`<img src="${s.url}"><input type="checkbox" class="chk" ${s.sel?"checked":""}><button class="rm">移除</button>`;
    const toggle=v=>{s.sel=v; d.classList.toggle("sel",v); d.querySelector(".chk").checked=v;};
    d.querySelector("img").onclick=()=>toggle(!s.sel);
    d.querySelector(".chk").onchange=e=>toggle(e.target.checked);
    d.querySelector(".rm").onclick=ev=>{ev.stopPropagation(); URL.revokeObjectURL(s.url); cam.shots.splice(i,1); renderStrip();};
    camStrip.appendChild(d);
  });
  const sel=cam.shots.filter(s=>s.sel).length;
  $("#camCount").textContent = cam.shots.length ? `已拍 ${cam.shots.length} 張，選取 ${sel} 張` : "尚未拍攝";
}
function addShots(){
  const sel=cam.shots.filter(s=>s.sel);
  if(!sel.length){ camMsg.textContent="請至少勾選一張要使用的照片。"; return; }
  const stamp=new Date().toISOString().replace(/[-:T]/g,"").slice(0,14);
  const files=sel.map((s,i)=>new File([s.blob],`shot_${stamp}_${String(i+1).padStart(2,"0")}.jpg`,{type:"image/jpeg"}));
  addFiles(files);
  cam.shots.forEach(s=>URL.revokeObjectURL(s.url));
  cam.shots=[];
  closeCam();
}

/* ---------- 清空 ---------- */
$("#clearBtn").onclick=()=>{ if(photos.length && confirm("確定清空所有照片？")){photos.length=0;render();} };

render();
</script>
